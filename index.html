<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼重設</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }
        p {
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .warning {
            color: #d93025;
            font-weight: bold;
            display: block;
            margin-top: 0.5rem;
        }
        a {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        a:hover {
            background-color: #0077ed;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>
            你好！想要密碼重設的話，請按下面的連結：
            <span class="warning">注意：一定要用麟雲公司網路才行</span>
        </p>
        <a href="http://192.168.1.77:5055/?action=sendtoken">重設密碼連結</a>
    </div>
</body>
</html>
